name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish release instead of keeping it as draft/prerelease"
        required: false
        default: "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2

      - run: npm ci

      - run: npx playwright install chromium

      - name: Check harness template path
        run: |
          npm run doctor
          npm run smoke:multi-app

      - name: Verify Phase 2 bundle
        run: npm run verify

      - name: Import Apple Developer ID certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            APP_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
            if [ -n "$APP_IDENTITY" ]; then
              echo "APPLE_SIGNING_IDENTITY=$APP_IDENTITY" >> "$GITHUB_ENV"
            fi
          fi
          if [ -z "$APPLE_INSTALLER_SIGNING_IDENTITY" ]; then
            INSTALLER_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Installer/ { print $2; exit }')"
            if [ -n "$INSTALLER_IDENTITY" ]; then
              echo "APPLE_INSTALLER_SIGNING_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"
            fi
          fi

      - name: Materialize App Store Connect API key
        if: ${{ env.APPLE_API_PRIVATE_KEY != '' && env.APPLE_API_KEY_PATH == '' }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf "%s" "$APPLE_API_PRIVATE_KEY" > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Phase 3 preflight
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY" ] || [ -n "$APPLE_CERTIFICATE" ]; then
            node scripts/phase3-preflight.mjs
          else
            node scripts/phase3-preflight.mjs --allow-missing-credentials
          fi

      - name: Build signed app bundle
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' || env.APPLE_CERTIFICATE != '' }}
        run: npm run tauri:build:app

      - name: Build unsigned internal app bundle
        if: ${{ env.APPLE_SIGNING_IDENTITY == '' && env.APPLE_CERTIFICATE == '' }}
        run: npm run tauri:build:app:no-sign

      - name: Package release evidence
        run: npm run phase3:package

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release-candidate
          path: release/

  windows-release:
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
      WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2

      - run: npm ci

      - run: npx playwright install chromium

      - name: Check harness template path
        run: |
          npm run doctor
          npm run smoke:multi-app

      - name: Verify Phase 2 bundle
        run: npm run verify

      - name: Import Windows signing certificate
        if: ${{ env.WINDOWS_CERTIFICATE != '' }}
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          if (-not $env:WINDOWS_CERTIFICATE_THUMBPRINT) {
            "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Phase 3 Windows preflight
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERTIFICATE_THUMBPRINT -or $env:WINDOWS_SIGN_COMMAND) {
            node scripts/phase3-preflight.mjs --platform windows
          } else {
            node scripts/phase3-preflight.mjs --platform windows --allow-missing-credentials
          }

      - name: Build signed Windows installer
        if: ${{ env.WINDOWS_CERTIFICATE_THUMBPRINT != '' || env.WINDOWS_SIGN_COMMAND != '' }}
        run: npm run tauri:build:windows

      - name: Build unsigned internal Windows installer
        if: ${{ env.WINDOWS_CERTIFICATE_THUMBPRINT == '' && env.WINDOWS_SIGN_COMMAND == '' }}
        run: npm run tauri:build:windows:no-sign

      - name: Package Windows release evidence
        run: npm run phase3:package:windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-candidate
          path: release/

  draft-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - macos-release
      - windows-release
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: false

      - name: Create GitHub draft release
        run: |
          if [ "${{ github.event.inputs.publish }}" = "true" ]; then
            node scripts/github-release-draft.mjs --verify-tag --publish
          else
            node scripts/github-release-draft.mjs --verify-tag
          fi

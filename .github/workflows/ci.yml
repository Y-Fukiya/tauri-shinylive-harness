name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.0"
      - run: npm ci
      - name: Install locked R packages for verification
        run: |
          Rscript -e 'install.packages("renv", repos = "https://cloud.r-project.org")'
          Rscript -e 'renv::restore(lockfile = "renv.lock", library = .libPaths()[1], prompt = FALSE)'
          Rscript -e 'stopifnot(as.character(packageVersion("shinylive")) == "0.5.0")'
      - uses: actions/cache@v5
        with:
          path: .shinylive-cache
          key: shinylive-assets-0.5.0
      - run: npm run cache:shinylive-assets
      - run: npx playwright install chromium
      - run: npm run doctor
      - run: npm run gate:bundle
      - run: npm run verify
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: harness-reports
          path: |
            reports/
            docs/generated/clinical-data-dictionary.md
            dist/reports/
            dist/checksums/

  windows-verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.0"
      - run: npm ci
      - name: Install locked R packages for verification
        run: |
          Rscript -e 'install.packages("renv", repos = "https://cloud.r-project.org")'
          Rscript -e 'renv::restore(lockfile = "renv.lock", library = .libPaths()[1], prompt = FALSE)'
          Rscript -e 'stopifnot(as.character(packageVersion("shinylive")) == "0.5.0")'
      - uses: actions/cache@v5
        with:
          path: .shinylive-cache
          key: shinylive-assets-0.5.0
      - run: npm run cache:shinylive-assets
      - run: npx playwright install chromium
      - run: npm run doctor
      - run: npm run gate:bundle
      - run: npm run verify
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: windows-harness-reports
          path: |
            reports/
            docs/generated/clinical-data-dictionary.md
            dist/reports/
            dist/checksums/
